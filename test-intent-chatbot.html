<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent Chatbot Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .test-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .test-section {
            margin-bottom: 30px;
        }

        .test-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .test-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .test-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .test-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .test-button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .test-button:hover {
            transform: translateY(-2px);
        }

        .test-button:active {
            transform: translateY(0);
        }

        .response-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            min-height: 60px;
            margin-top: 20px;
        }

        .response-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .response-text {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .quick-tests {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .quick-test-btn {
            padding: 12px 20px;
            background: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .quick-test-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .stats-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .stats-box h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🎯 Intent Chatbot Test</h1>
        <p class="subtitle">Test the intent-based conversational system</p>

        <div class="test-section">
            <h2>Test Intent Matching</h2>
            <div class="test-input-group">
                <input type="text" class="test-input" id="testInput" placeholder="Type a message (e.g., 'hello', 'how are you', 'thanks')">
                <button class="test-button" id="testButton">Test</button>
            </div>

            <div class="response-box">
                <div class="response-label">Response</div>
                <div class="response-text" id="responseText">Enter a message above to test the intent system</div>
            </div>

            <h3 style="margin-top: 30px; margin-bottom: 15px; color: #667eea;">Quick Tests</h3>
            <div class="quick-tests">
                <button class="quick-test-btn" data-message="hello">Hello</button>
                <button class="quick-test-btn" data-message="how are you">How are you?</button>
                <button class="quick-test-btn" data-message="thanks">Thank you</button>
                <button class="quick-test-btn" data-message="bye">Goodbye</button>
                <button class="quick-test-btn" data-message="tell me a joke">Tell a joke</button>
                <button class="quick-test-btn" data-message="help">Help</button>
                <button class="quick-test-btn" data-message="good morning">Good morning</button>
                <button class="quick-test-btn" data-message="what is your name">Your name?</button>
            </div>
        </div>

        <div class="test-section">
            <h2>System Statistics</h2>
            <div class="stats-box">
                <h3>Intent System Stats</h3>
                <div id="statsContent">Loading...</div>
            </div>
        </div>
    </div>

    <script src="js/features/intent-chatbot.js"></script>
    <script>
        // Test intent matching
        function testIntent(message) {
            if (!message || message.trim() === '') {
                document.getElementById('responseText').textContent = 'Please enter a message!';
                return;
            }

            const response = window.IntentChatbot.getIntentBasedResponse(message);
            
            if (response) {
                document.getElementById('responseText').textContent = response;
            } else {
                document.getElementById('responseText').textContent = '❌ No intent matched - This would fall back to AI response';
            }
        }

        // Event listeners
        document.getElementById('testButton').addEventListener('click', () => {
            const input = document.getElementById('testInput');
            testIntent(input.value);
        });

        document.getElementById('testInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                testIntent(e.target.value);
            }
        });

        // Quick test buttons
        document.querySelectorAll('.quick-test-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const message = btn.dataset.message;
                document.getElementById('testInput').value = message;
                testIntent(message);
            });
        });

        // Show stats
        function showStats() {
            const stats = window.IntentChatbot.getStats();
            const statsHTML = `
                <div class="stat-item">
                    <span>Total Intents</span>
                    <span>${stats.totalIntents}</span>
                </div>
                <div class="stat-item">
                    <span>Total Responses</span>
                    <span>${stats.totalResponses}</span>
                </div>
                <div class="stat-item">
                    <span>Intent Names</span>
                    <span>${stats.intentNames.join(', ')}</span>
                </div>
            `;
            document.getElementById('statsContent').innerHTML = statsHTML;
        }

        // Initialize
        showStats();
        console.log('✅ Test page loaded successfully');
    </script>
</body>
</html>
